# Fixture 09: grid y feature (player_y) carries its own discretize: identity — double-counting.
# Violates §1.3/7 (y feature must not have non-none discretize other than the grid).
schema_version: 1
kind: feature-map
meta:
  name: demo-game
  workload: refwork-demo
  game_revision: "operator-set"
  version: 1
regions:
  - { name: wram, size: 131072 }
features:
  - name: room_id
    region: wram
    offset: 0x079B
    type: u16le
    semantics: room_id
    stability: stable
    discretize: { kind: identity }

  - name: player_y
    region: wram
    offset: 0x0AFA
    type: u16le
    semantics: position_y
    stability: volatile
    discretize: { kind: identity }   # non-none: double-counting — violates §1.3/7

  - name: player_x
    region: wram
    offset: 0x0AF6
    type: u16le
    semantics: position_x
    stability: volatile
    discretize:
      { kind: grid, x: player_x, y: player_y, room: room_id, cell_w: 32, cell_h: 32 }

  - name: game_mode
    region: wram
    offset: 0x0998
    type: u8
    semantics: mode
    stability: stable
    discretize: { kind: identity }

  - name: credits_flag
    region: wram
    offset: 0x09DA
    type: u8
    semantics: progress_flag
    stability: stable
    discretize: { kind: identity }
