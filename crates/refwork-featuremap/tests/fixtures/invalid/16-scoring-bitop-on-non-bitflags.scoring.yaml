# Fixture 16 SCORING: bit_set on game_mode (u8, not bitflags). Violates x/bitop-target.
schema_version: 1
kind: scoring-program
meta:
  name: demo-game
  feature_map: demo-game
  version: 1
stages:
  monotone: true
  list:
    - name: mode_bit_check
      points: 100
      when: { feature: game_mode, op: bit_set, bit: 3 }   # game_mode is u8 — x/bitop-target
    - name: reached_credits
      points: 2000
      when: { feature: credits_flag, op: ne, value: 0 }
goal:
  name: credits_reached
  predicate: { feature: credits_flag, op: ne, value: 0 }
