name: ci
on:
  pull_request:
  push:
jobs:
  rust:
    strategy:
      # aarch64 leg (plan phase-2/07 item 3): GitHub-hosted arm64 runner —
      # rung 1 of the decision ladder (hosted arm → self-hosted Spark →
      # QEMU). Historically free for public repos only; if this leg fails
      # to schedule, fall back per the plan and record the change there.
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          path: control-plane
      # dh-proto (worker gRPC contract) is a path dep on the sibling
      # determinism-hypervisor checkout, like determinism-proto above.
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/determinism-hypervisor
          path: determinism-hypervisor
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
        working-directory: repo
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: repo
      # Determinism deny-gate (ARCHITECTURE.md §1 D1-D4): bans thread/clock/
      # rand/float/HashMap tokens from the core and harness crates.
      - run: cargo run -p xtask -- deny
        working-directory: repo
      - run: cargo build --workspace --locked
        working-directory: repo
      - run: cargo test --workspace --locked
        working-directory: repo
      # M0 gate: the platform-canonical demo artifacts must validate
      # (IMPLEMENTATION-PLAN.md M0 acceptance).
      - run: cargo run --locked -p refwork-featuremap -- validate feature-maps/demo-game.yaml --scoring scoring/demo-game.yaml
        working-directory: repo
      # Schema-drift gate: the committed JSON Schema must match the types.
      # Regenerate with:
      #   cargo run -p refwork-featuremap -- schema > schema/feature-map.schema.json
      - run: |
          cargo run --locked -p refwork-featuremap -- schema > /tmp/feature-map.schema.json
          diff -u schema/feature-map.schema.json /tmp/feature-map.schema.json
        working-directory: repo
      # M1 acceptance gates (IMPLEMENTATION-PLAN.md M1), release mode:
      # synthetic-ROM 10,000-frame double-run with identical frame hashes,
      # and the zero-allocations-per-frame counting-allocator check.
      - run: cargo test --release --locked -p xtask --test determinism -- --include-ignored
        working-directory: repo
      - run: cargo test --release --locked -p xtask --test zero_alloc
        working-directory: repo
      # M2 cross-arch probe (plan phase-2/07 item 3): per-PR 10k-frame
      # chained hash, published as a per-arch artifact and byte-compared by
      # the cross-arch job (artifacts avoid the documented matrix-job
      # output-overwrite hazard). Nightly runs the same compare at 100k.
      - run: |
          set -euo pipefail
          out=$(cargo run --locked --release -p xtask -- hash-chain --frames 10000)
          echo "$out"
          chain=$(echo "$out" | sed -nE 's/.*chain=([0-9a-f]{64}).*/\1/p')
          test -n "$chain" || { echo "could not extract a 64-hex chain"; exit 1; }
          echo "$chain" > "/tmp/hash-$(uname -m).txt"
        working-directory: repo
      - uses: actions/upload-artifact@v4
        with:
          name: hash-chain-${{ matrix.runner }}
          path: /tmp/hash-*.txt
          if-no-files-found: error
  # Cross-arch determinism gate: the synthetic-ROM chained hash must be
  # bit-identical on x86_64 and aarch64 (catches latent float/UB issues —
  # IMPLEMENTATION-PLAN.md M2). CI covers the synthetic ROM only; the M2
  # evidence run (demo game, real aarch64 hardware) is a lab job.
  cross-arch:
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: hash-chain-*
          merge-multiple: true
          path: hashes
      - run: |
          set -euo pipefail
          ls -l hashes
          x=$(cat hashes/hash-x86_64.txt)
          a=$(cat hashes/hash-aarch64.txt)
          echo "x86_64:  $x"
          echo "aarch64: $a"
          test "$x" = "$a" || { echo "CROSS-ARCH HASH MISMATCH"; exit 1; }
          echo "cross-arch chained hashes identical"
