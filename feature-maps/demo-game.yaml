# PLACEHOLDER FILE — offsets shown here are NOT validated game addresses.
# They are illustrative values from the specification (API.md §1.4).
# Real values must be discovered with `ramdiff`/`refwork-verify map-check`
# and committed by the operator for their specific ROM revision; see §1.5.
schema_version: 1
kind: feature-map
meta:
  name: demo-game
  workload: refwork-demo
  game_revision: "operator-set"
  version: 1
regions:
  - { name: wram, size: 131072 }
features:
  - name: room_id
    region: wram
    offset: 0x079B
    type: u16le
    semantics: room_id
    description: "Current room/area identifier"
    stability: stable
    discretize: { kind: identity }

  - name: area_id
    region: wram
    offset: 0x079F
    type: u8
    semantics: room_id
    description: "Macro area/zone index"
    stability: stable
    discretize: { kind: identity }

  - name: player_x
    region: wram
    offset: 0x0AF6
    type: u16le
    semantics: position_x
    description: "Player X position in room, pixels"
    stability: volatile          # garbage during room transitions
    discretize:                  # spatial novelty: 32x32-pixel cells keyed by room_id
      { kind: grid, x: player_x, y: player_y, room: room_id, cell_w: 32, cell_h: 32 }

  - name: player_y
    region: wram
    offset: 0x0AFA
    type: u16le
    semantics: position_y
    description: "Player Y position in room, pixels"
    stability: volatile
    discretize: { kind: none }   # covered by player_x's grid (§1.3 rule 7)

  - name: health
    region: wram
    offset: 0x09C2
    type: u16le
    semantics: health
    description: "Current health points"
    stability: stable
    discretize: { kind: threshold, edges: [1, 30, 100, 300] }

  - name: upgrade_flags
    region: wram
    offset: 0x09A4
    type: bitflags16le
    semantics: flags
    description: "Collected-upgrade bitmask (bit0=mobility-1, bit1=weapon-1, ...)"
    stability: stable
    discretize: { kind: bits }

  - name: boss_flags
    region: wram
    offset: 0x7829
    type: bitflags8
    semantics: progress_flag
    description: "Boss-defeated bitmask (bit0=boss1 ... bit3=final boss)"
    stability: stable
    discretize: { kind: bits }

  - name: game_mode
    region: wram
    offset: 0x0998
    type: u8
    semantics: mode
    description: "Main state machine: 0x07=gameplay, 0x26=credits, others=menu/load/cutscene"
    stability: stable
    discretize: { kind: identity }

  - name: credits_flag
    region: wram
    offset: 0x09DA
    type: u8
    semantics: progress_flag
    description: "Nonzero once the end-credits sequence has started"
    stability: stable
    discretize: { kind: identity }
