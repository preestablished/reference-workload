# Package-04 boot manifest, consumed by detguest-agent in the guest
# (schema owner: guest-sdk, its API.md §7.1 — modeled on guest-sdk's
# boot.toml.m9-refwork-contract). Staged into the initramfs as
# /etc/detguest/boot.toml. The agent drives the refwork-ctl control leg
# (Hello -> LoadGame -> ... -> Start) before Ready and withholds Ready
# until the expected regions below are live in the detchannel manifest
# (ready_after = regions-registered-and-start-sent).
#
# Region sizes/formats are NOT stated here — the agent gates on
# name + layout_version only; the host-side size/format contract lives in
# expected-regions.toml and the dist manifest.
boot_toml_version = 1

[autostart]
unit = 0

[[unit]]
id = 0
exec = "/usr/bin/refwork-harness"
log_mask = 0x1F

[unit.control]
protocol = "refwork-ctl"
proto_version = 1
game_dev = "/dev/vdb"

[[expected_region]]
name = "wram"
layout_version = 1

[[expected_region]]
name = "framebuffer"
layout_version = 1

[[expected_region]]
name = "meta"
layout_version = 1
