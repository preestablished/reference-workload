schema_version = 2
kind = "refwork-guest-sdk-lock"

# Rev-pin, build-from-sibling (decision: .agents/decisions/
# 2026-07-02-kernel-agent-artifact-split.md). Unlike the kernel (heavy,
# artifact-pinned), the agent is a seconds-cheap cargo target: xtask image
# build verifies the sibling ../guest-sdk checkout is at exactly this rev,
# builds detguest-agent for the musl target, and stages it. Bump by
# updating rev after guest-sdk lands what the image needs.

[guest_sdk]
status = "pinned-rev"
repo = "guest-sdk"
# 2026-07-07 bump 487ff564 -> acb1d3e8: delta is guest-sdk request docs +
# their own VM tests only (no detguest-agent source change); keeps the
# exact-rev verify green against the sibling's current HEAD.
rev = "acb1d3e8514a35eff66e94696d3a497b21328323"
agent = "detguest-agent"
agent_build = "cargo build --locked --release --target x86_64-unknown-linux-musl -p detguest-agent"

[boot_contract]
boot_toml_schema_owner = "guest-sdk"
expected_regions_schema_owner = "guest-sdk"
ready_after = "regions-registered-and-start-sent"
